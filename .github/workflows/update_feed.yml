name: Auto-Update YML Feed
on:
  schedule:
    - cron: '0 3 * * *' 
  workflow_dispatch: 

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 
          
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/feed.py') }}
          restore-keys: |
            playwright-${{ runner.os }}-
            
      - name: Install dependencies
        run: |
          pip install crawl4ai pydantic openai lxml beautifulsoup4 aiohttp playwright Pillow backoff requests
          playwright install chromium

      - name: Run Scraper
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python feed.py --auto
        
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add cartune-euro_ru_dodge_vse-modeli_dvigatel_feed.xml feed_cache.json feed_settings.json
          git commit -m "Auto-update YML feed [skip ci]" || echo "No changes"
          git push
